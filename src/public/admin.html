<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - WhatsApp Forward Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 15px; margin-bottom: 30px; }
        header h1 { font-size: 32px; margin-bottom: 5px; }
        header p { opacity: 0.9; font-size: 14px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08); }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #999; margin-top: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08); border-left: 4px solid #667eea; }
        .card h2 { color: #333; font-size: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .btn-danger { background: #ff6b6b; color: white; font-size: 12px; padding: 6px 12px; width: auto; }
        .btn-danger:hover { background: #ee5a52; }
        .table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table th { background: #f8f9fa; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #e0e0e0; }
        .table td { padding: 12px; border-bottom: 1px solid #e0e0e0; }
        .empty { text-align: center; padding: 40px; color: #999; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .alert-success { background: #d4edda; color: #155724; display: block; }
        .alert-error { background: #f8d7da; color: #721c24; display: block; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Admin Panel</h1>
            <p>WhatsApp Forwarding Bot Management</p>
        </header>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="totalRules">0</div>
                <div class="stat-label">সক্রিয় রুল</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="activeUsers">0</div>
                <div class="stat-label">সংযুক্ত ব্যবহারকারী</div>
            </div>
        </div>

        <div id="alertBox" class="alert"></div>

        <div class="grid">
            <div class="card">
                <h2>➕ নতুন রুল যোগ করুন</h2>
                <form id="ruleForm">
                    <div class="form-group">
                        <label>কীওয়ার্ড *</label>
                        <input type="text" id="keyword" placeholder="যেমন: বায়ো, সাহায্য, তথ্য" required>
                    </div>
                    <div class="form-group">
                        <label>ফরওয়ার্ড নম্বর *</label>
                        <input type="text" id="phoneNumber" placeholder="+880xxxxxxxxxx" required>
                    </div>
                    <button type="submit" class="btn-primary">✅ যোগ করুন</button>
                </form>
            </div>

            <div class="card">
                <h2>📋 সব রুলস</h2>
                <div id="rulesContainer">
                    <div class="empty">লোড হচ্ছে...</div>
                </div>
            </div>

            <div class="card">
                <h2>👥 সংযুক্ত ব্যবহারকারী</h2>
                <div id="usersContainer">
                    <div class="empty">লোড হচ্ছে...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            setTimeout(() => { alertBox.className = 'alert'; }, 5000);
        }

        async function loadRules() {
            try {
                const response = await fetch('/api/rules');
                const rules = await response.json();
                document.getElementById('totalRules').textContent = rules.length;
                const container = document.getElementById('rulesContainer');
                if (rules.length === 0) {
                    container.innerHTML = '<div class="empty">কোন রুলস নেই</div>';
                    return;
                }
                let html = '<table class="table"><thead><tr><th>কীওয়ার্ড</th><th>নম্বর</th><th>অ্যাকশন</th></tr></thead><tbody>';
                rules.forEach(rule => {
                    html += `<tr><td><strong>${rule.keyword}</strong></td><td>${rule.forward_number}</td><td><button class="btn-danger" onclick="deleteRule('${rule.keyword}')">🗑️ মুছুন</button></td></tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading rules:', error);
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                document.getElementById('activeUsers').textContent = users.length;
                const container = document.getElementById('usersContainer');
                if (users.length === 0) {
                    container.innerHTML = '<div class="empty">কোন সংযুক্ত ব্যবহারকারী নেই</div>';
                    return;
                }
                let html = '<table class="table"><thead><tr><th>আইডি</th><th>নম্বর</th><th>স্ট্যাটাস</th></tr></thead><tbody>';
                users.forEach(user => {
                    html += `<tr><td><small>${user.user_id}</small></td><td>${user.whatsapp_number || 'N/A'}</td><td><span class="badge badge-success">সংযুক্ত</span></td></tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        document.getElementById('ruleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keyword = document.getElementById('keyword').value.trim();
            const forwardNumber = document.getElementById('phoneNumber').value.trim();
            try {
                const response = await fetch('/api/rules', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword, forwardNumber })
                });
                const data = await response.json();
                if (response.ok) {
                    showAlert(`রুল যোগ হয়েছে: "${keyword}"`, 'success');
                    document.getElementById('ruleForm').reset();
                    loadRules();
                } else {
                    showAlert(data.error || 'ত্রুটি', 'error');
                }
            } catch (error) {
                console.error('Error adding rule:', error);
                showAlert('সার্ভার এরর', 'error');
            }
        });

        async function deleteRule(keyword) {
            if (!confirm(`"${keyword}" রুল মুছতে নিশ্চিত?`)) return;
            try {
                const response = await fetch(`/api/rules/${encodeURIComponent(keyword)}`, { method: 'DELETE' });
                if (response.ok) {
                    showAlert('রুল মুছা হয়েছে', 'success');
                    loadRules();
                } else {
                    showAlert('ত্রুটি', 'error');
                }
            } catch (error) {
                console.error('Error deleting rule:', error);
                showAlert('সার্ভার এরর', 'error');
            }
        }

        window.addEventListener('load', () => {
            loadRules();
            loadUsers();
            setInterval(loadRules, 5000);
            setInterval(loadUsers, 5000);
        });
    </script>
</body>
</html>
